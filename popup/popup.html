<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin: 0 0 16px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      color: #fff;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-page {
      background: linear-gradient(135deg, #ff3b30, #ff6b6b);
      margin-bottom: 10px;
    }
    .btn-page:hover:not(:disabled) { opacity: 0.9; }
    .btn-all {
      background: linear-gradient(135deg, #ff9500, #ffcc02);
      margin-bottom: 16px;
    }
    .btn-all:hover:not(:disabled) { opacity: 0.9; }
    #status {
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      padding: 8px;
      border-radius: 8px;
    }
    #status.success { background: #30d15833; color: #30d158; }
    #status.error   { background: #ff3b3033; color: #ff453a; }
    #status.info    { background: #5e5ce633; color: #5e5ce6; }
  </style>
</head>
<body>
  <h1>🍪 Cookie Cleaner</h1>
  <button class="btn-page" id="deletePageCookies">Удалить куки страницы</button>
  <button class="btn-all"   id="deleteAllCookies">Удалить все куки</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
